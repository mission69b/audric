<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Audric · Dashboard (Light)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  /* All color/shadow/radius/space tokens come from colors_and_type.css.
     These are short aliases scoped to the app for readability. */
  :root{
    --bg:      var(--surface-page);       /* canvas */
    --panel:   var(--surface-card);       /* card */
    --panel-2: var(--surface-sunken);     /* inset */
    --line:    var(--border-subtle);      /* card borders */
    --line-2:  var(--border-strong);      /* interactive borders */
    --text:    var(--fg-primary);
    --text-2:  var(--fg-secondary);
    --text-3:  var(--fg-muted);
    --green:   var(--success-solid);
    --green-d: var(--g700);
    --blue:    var(--accent-primary);
    --red:     var(--error-solid);
    --yellow:  var(--y600);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;height:100%;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;transition:background .12s ease, color .12s ease, border-color .12s ease, opacity .12s ease}
  button:hover{opacity:.92}
  a{color:inherit;text-decoration:none;transition:color .12s ease}
  a:hover{color:var(--text)}
  input,textarea{font:inherit;color:inherit;background:transparent;border:none;outline:none}
  input:focus,textarea:focus{outline:none}
  .mono{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em}
  #root{height:100%}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
  /* Card + row hover */
  .hover-card{transition:border-color .12s ease, background .12s ease}
  .hover-card:hover{border-color:var(--line-2)}
  .hover-row:hover{background:var(--panel)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./primitives.jsx"></script>
<script type="text/babel" src="./sidebar.jsx"></script>
<script type="text/babel" src="./dashboard.jsx"></script>
<script type="text/babel" src="./portfolio.jsx"></script>
<script type="text/babel" src="./activity.jsx"></script>
<script type="text/babel" src="./pay.jsx"></script>
<script type="text/babel" src="./goals.jsx"></script>
<script type="text/babel" src="./contacts.jsx"></script>
<script type="text/babel" src="./store.jsx"></script>
<script type="text/babel" src="./settings.jsx"></script>
<script type="text/babel" src="./app.jsx"></script>
</body>
</html>
