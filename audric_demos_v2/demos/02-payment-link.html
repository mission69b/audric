// ── Fake QR code ─────────────────────────────────────────────────────────────
const FakeQR = ({ size = 140 }) => {
  const cells = useMemo(() => {
    const arr = []; let s = 92847;
    for (let i = 0; i < 625; i++) { s = (s * 9301 + 49297) % 233280; arr.push(s / 233280 > 0.5); }
    const corner = (cx, cy) => {
      for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
        arr[(cy + y) * 25 + (cx + x)] = (x === 0 || x === 6 || y === 0 || y === 6 || (x >= 2 && x <= 4 && y >= 2 && y <= 4));
      }
    };
    corner(0,0); corner(18,0); corner(0,18); return arr;
  }, []);
  return (
    <div style={{padding:8,background:'#fff',borderRadius:6,border:'1px solid var(--line-2)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(25,1fr)',gridTemplateRows:'repeat(25,1fr)',width:size,height:size}}>
        {cells.map((on,i) => <div key={i} style={{background:on?'#000':'transparent'}}/>)}
      </div>
    </div>
  );
};

                  <div>
                    <div style={{fontSize:13,color:'var(--green)'}}>+$4.50 USDC received</div>
                    <div className="mono" style={{fontSize:9,color:'var(--green)',letterSpacing:'.1em',marginTop:2}}>SETTLED · 0.4s · GAS $0.00 · ENOKI SPONSORED</div>
                  </div>
                </div>
              )}
              {cs >= 7 && (
                <div className="appear compare-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                  {[
                    { label:'STRIPE',     v1:'2.9% + 30¢', v2:'2–5 days',   good:false },
                    { label:'PAYPAL',     v1:'3.5% + 49¢', v2:'3–4 days',   good:false },
                    { label:'AUDRIC PAY', v1:'$0.003 gas',  v2:'0.4 seconds',good:true  },
                  ].map(c => (
                    <div key={c.label} style={{border:`1px solid ${c.good?'rgba(40,128,52,0.3)':'rgba(213,11,11,0.2)'}`,background:c.good?'rgba(40,128,52,0.06)':'var(--panel)',borderRadius:8,padding:'12px 14px'}}>
                      <div className="mono" style={{fontSize:9,color:c.good?'var(--green)':'var(--text-3)'}}>{c.label}</div>
                      <div style={{fontFamily:'var(--font-serif)',fontSize:17,marginTop:6,color:c.good?'var(--green)':'var(--red)'}}>{c.v1}</div>
                      <div style={{fontSize:11,color:c.good?'var(--green)':'var(--text-3)',marginTop:4}}>{c.v2}</div>
                    </div>
                  ))}
                </div>
              )}
              {cs >= 7 && (
                <WhyOnlySui points={[
                  "The buyer paid with a Google account. No wallet install, no seed phrase, no gas — zkLogin makes this possible only on Sui.",
                  "The payment link is just a URL backed by a Move object. No POS terminal, no gateway account, no monthly fees.",
                  "USDC settled to your Passport in 0.4s. That $4.50 is now earning 8.4% APY — Stripe would still be holding it.",
                ]}/>
              )}
            </div>
          </div>
          <div style={{flexShrink:0,background:'linear-gradient(to top,var(--bg) 60%,transparent)',paddingBottom:'max(16px,env(safe-area-inset-bottom,16px))'}}>
            <BottomActionNav/>
            <Composer value=""/>
          </div>
        </>
      )}
    </>
  );

  // ── Buyer panel content ──────────────────────────────────────────────────
  const BuyerContent = () => (
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'var(--panel-2)',padding:'20px 24px',gap:10,overflowY:'auto',minHeight:0}}>
      <div className="mono" style={{fontSize:9,color:'var(--text-3)',letterSpacing:'.16em'}}>// BUYER'S VIEW</div>
      <AudricPayPanel checkStep={checkStep}/>
    </div>
  );

  // ── MOBILE layout: tabs ──────────────────────────────────────────────────
  if (isMobile) {
    return (
      <>
        {!passportDone && <AlexPassport onDone={() => setPassportDone(true)}/>}
        <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:'var(--bg)',overflow:'hidden'}}>
          {/* Tab bar — only show once buyer panel is relevant */}
          {isSplit && (
            <div style={{display:'flex',borderBottom:'1px solid var(--line)',background:'var(--panel-2)',flexShrink:0}}>
              {[['merchant','MERCHANT · ALEX'],['buyer','BUYER']].map(([id,label]) => (
                <button key={id} onClick={() => setActiveTab(id)} className="mono" style={{
                  flex:1, padding:'11px 8px', fontSize:9, letterSpacing:'.12em',
                  borderBottom: activeTab===id ? '2px solid var(--text)' : '2px solid transparent',
                  color: activeTab===id ? 'var(--text)' : 'var(--text-3)',
                  background:'transparent', cursor:'pointer', transition:'color .15s, border-color .15s'
                }}>{label}</button>
              ))}
            </div>
          )}
          {/* Active panel */}
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {activeTab === 'merchant' ? <MerchantContent/> : <BuyerContent/>}
          </div>
        </div>
      </>
    );
  }

  // ── DESKTOP layout: split screen ─────────────────────────────────────────
  return (
    <>
      {!passportDone && <AlexPassport onDone={() => setPassportDone(true)}/>}
      <div className={isSplit ? 'd02-split' : ''} style={{height:'100vh',display:'flex',background:'var(--bg)',overflow:'hidden'}}>
        <div className={isSplit ? 'd02-merchant' : ''} style={{
          display:'flex', flexDirection:'column',
          flex: isSplit ? '0 0 56%' : '1',
          minWidth:0, overflow:'hidden',
          borderRight: isSplit ? '1px solid var(--line)' : 'none',
          transition:'flex .45s cubic-bezier(0.22,1,0.36,1)'
        }}>
          <MerchantContent/>
        </div>
        {isSplit && (
          <div className="slide-in d02-buyer" style={{flex:'0 0 44%',display:'flex',flexDirection:'column',background:'var(--panel-2)',padding:'20px 24px',gap:10,overflowY:'auto'}}>
            <div className="mono" style={{fontSize:9,color:'var(--text-3)',letterSpacing:'.16em'}}>// BUYER'S VIEW</div>
            <AudricPayPanel checkStep={checkStep}/>
          </div>
        )}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Demo2/>);
</script>
</body>
</html>
