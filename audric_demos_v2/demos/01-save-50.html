<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 1 · One Sentence, 3 Ops — Audric × Sui</title>
<link rel="stylesheet" href="../shared/audric.css?v=6">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../shared/primitives.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const PROMPT = "Swap 10% into SUI, save 50% of my remaining USDC, then send $100 to Mom.";
const THOUGHT = "Three operations the user wants chained. I'll resolve each: (1) swap $200 USDC → SUI via Cetus best-route. (2) Of the $1,800 remaining USDC, save half — swap $900 to USDsui and deposit into NAVI's 8.4% pool. (3) Send $100 USDC to Mom (resolved from contacts → 0xa3f9…b27c). All three compile into one atomic Payment Intent — if any leg fails, none execute. Total gas sponsored ~$0.005.";

const Demo1 = () => {
  const [step, setStep] = useState(0);
  const typed = useTyped(PROMPT, step===0, 28);

  // 0 typing, 1 sent, 2 thinking, 3 querying, 4 plan ready, 5 permission visible, 6 executing, 7 done
  useEffect(() => {
    const delays = { 0: PROMPT.length*28+500, 1: 800, 2: 2300, 3: 4200, 4: 800 };
    const d = delays[step]; if (d == null) return;
    const t = setTimeout(()=>setStep(s=>Math.min(s+1, 5)), d);
    return ()=>clearTimeout(t);
  }, [step]);

  const approve = () => { setStep(6); setTimeout(()=>setStep(7), 1700); };
  const restart = () => { setStep(0); };

  const tools = [
    {glyph:'💰',label:'BALANCE',         finishAt: 800,  result:'$2,000 USDC'},
    {glyph:'⇆',label:'CETUS · SUI ROUTE', finishAt: 1400, result:'$200 → 212.77 SUI · 0.03%'},
    {glyph:'📈',label:'NAVI USDSUI POOL', finishAt: 2200, result:'8.4% APY · TVL $48M'},
    {glyph:'👤',label:'CONTACT · "MOM"',  finishAt: 2900, result:'0xa3f9…b27c · verified'},
    {glyph:'⊞',label:'PLAN STREAM',       finishAt: 3800, result:'3 ops · atomic'},
  ];

  return (
    <>
      <MainShell
        hero={step===0}
        balance={step>=7 ? '$800' : '$2,000'}
        balanceLabel={step>=7 ? 'AVAILABLE $800 · EARNING $11' : 'AVAILABLE $2,000 · EARNING $11'}
        composer={<Composer value={step===0 ? typed : ''}/>}
        ribbon={<DemoRibbon demoNum={1} demoTitle="ONE SENTENCE, 3 OPS — AGENTIC FINANCE" sentence="One sentence. Three on-chain operations. One atomic Payment Intent." onRestart={restart}/>}
      >
        <TaskInitiated/>
        {step >= 1 && <UserBubble>{PROMPT}</UserBubble>}

        {step >= 2 && (
          <>
            <ThinkingHeader done={step>=3}/>
            <ReasoningStream text={THOUGHT} active={step>=2} done={step>=3}/>
            {step>=3 && <ParallelTools tools={tools} active={step>=3} headerLabel="DISPATCHING 5 READS · PARALLEL"/>}
            {step>=4 && (
              <HowIEvaluated tokens="368" model="AUDRIC v2.0" latency="2.9s">
                Three sequential operations, but reads run in parallel. Order matters: swap to SUI first (so the 50% calc is on the remaining USDC, not the total), then save half, then send. Compiled into one Payment Intent — atomic guarantees mean a single failure reverts the whole batch. Gas sponsored, total cost ~$0.005.
              </HowIEvaluated>
            )}
          </>
        )}

        {step >= 5 && (
          <>
            <AudricLine>
              Three operations chained: <strong style={{color:'var(--text)'}}>swap → save → send</strong>. Compiled into one Payment Intent so they execute atomically. If any leg fails, nothing happens. <strong style={{color:'var(--text)'}}>Confirm?</strong>
            </AudricLine>

            <PermissionCard
              title="PERMISSION REQUIRED · 1 PAYMENT INTENT · ATOMIC"
              subtitle="3 OPERATIONS · 1 SIGNATURE"
              rows={[
                {title:'1 · Swap $200 USDC → SUI',         sub:'Cetus best-route · 0.03% slippage · 212.77 SUI', right:'CETUS'},
                {title:'2 · Swap $900 USDC → USDsui + deposit', sub:'50% of remaining · NAVI 8.4% APY',          right:'NAVI · 8.4%'},
                {title:'3 · Send $100 USDC → Mom',          sub:'0xa3f9…b27c · resolved from contacts',         right:'TRANSFER'},
              ]}
              footer={<><Icon name="bolt" size={12} color="var(--blue)"/><span>One signature, three operations. <strong style={{color:'var(--text)'}}>If any leg fails, none execute.</strong> Gas sponsored ~$0.005.</span></>}
              onApprove={approve}
              executing={step===6}
              executed={step>=7}
              executionDetail="0.6s · 3 OPS · GAS $0.005 SPONSORED · TX 7bZfo2…iDfeBQ"
            />
          </>
        )}

        {step >= 7 && (
          <>
            <div className="appear d01-balcards" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              <BalCard label="AVAILABLE · USDC"   amount="$800"  sub="instantly spendable"/>
              <BalCard label="EARNING · USDSUI" amount="$900"  sub="8.4% APY · NAVI · earning now" green/>
              <BalCard label="HELD · SUI"        amount="212.77"   sub="$200 @ $0.94 · spec position"/>
            </div>
            <AudricLine>
              All three settled. <strong style={{color:'var(--green)'}}>$900 is earning yield right now</strong> — first interest accrues this block, paid out continuously. <strong style={{color:'var(--text)'}}>$100 sent to Mom</strong> — confirmed on-chain in 0.6s.
            </AudricLine>
            <div className="appear" style={{border:'1px solid var(--line)',borderRadius:8,background:'var(--panel-2)',padding:'14px 18px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
              {[
                {l:'PER DAY',  v:'+$0.21'},
                {l:'PER WEEK', v:'+$1.45'},
                {l:'PER YEAR', v:'+$75.60'},
              ].map(s=>(
                <div key={s.l}>
                  <div className="mono" style={{fontSize:9,color:'var(--text-3)'}}>{s.l}</div>
                  <div style={{fontSize:18,marginTop:6,letterSpacing:'-.01em',color:s.l==='PER YEAR'?'var(--green-d)':'var(--text)'}}>{s.v}</div>
                </div>
              ))}
            </div>
            <div className="appear" style={{display:'flex',gap:8,justifyContent:'center',marginTop:6,flexWrap:'wrap'}}>
              <Pill icon="chevron-right">ADD A GOAL</Pill>
              <Pill icon="chevron-right">VIEW ON SUISCAN</Pill>
              <Pill icon="chevron-right">MESSAGE MOM</Pill>
            </div>
            <WhyOnlySui points={[
              "Swap, deposit, and send — 3 on-chain operations in one PTB. On Ethereum, that's 3 separate transactions with $10+ gas each.",
              "USDsui earns 8.4% APY natively on Sui. No bridge, no wrapped asset, no liquidity fragmentation.",
              '"Send $100 to Mom" resolved to a Sui address in milliseconds. No bank routing, no IBAN, no 2-day settlement window.',
            ]}/>
          </>
        )}
      </MainShell>
    </>
  );
};
const BalCard = ({label,amount,sub,green}) => (
  <div style={{border:'1px solid '+(green?'rgba(40,128,52,0.3)':'var(--line)'),borderRadius:8,padding:'14px 18px',background:green?'rgba(40,128,52,0.06)':'var(--panel)'}}>
    <div className="mono" style={{fontSize:9,color:green?'var(--green)':'var(--text-3)'}}>{label}</div>
    <div style={{fontFamily:'var(--font-serif)',fontSize:26,marginTop:6,letterSpacing:'-.01em'}}>{amount}</div>
    <div style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{sub}</div>
  </div>
);
ReactDOM.createRoot(document.getElementById('root')).render(<Demo1/>);
</script></body></html>
