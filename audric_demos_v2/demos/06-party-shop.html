<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 6 · Party Shopping — Audric × Sui</title>
<link rel="stylesheet" href="../shared/audric.css?v=5">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../shared/primitives.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const PROMPT = "Buy everything for my house party this Saturday — balloons, fairy lights, a birthday cake, and a banner. Budget $120.";
const THOUGHT = "5 items across 3 vendors, all with MPP endpoints. I'll run parallel price + availability queries, confirm Saturday delivery for each, then compile a cart. If the total is under $120, I'll generate one Payment Stream to cover all three vendors atomically — one signature, one USDC transaction.";

const CART = [
  { name: 'Balloons × 20 + streamers',    vendor: 'Party City', price: '$20', detail: 'MPP · same-day · ships Sat' },
  { name: 'Fairy lights 10m (warm white)', vendor: 'Amazon',     price: '$24', detail: 'MPP · Prime · ships Sat' },
  { name: 'Custom cake, 10-inch',          vendor: 'CakeBoss',   price: '$55', detail: 'MPP · pickup Sat 10am' },
  { name: '"Happy Birthday" banner',       vendor: 'Amazon',     price: '$9',  detail: 'MPP · Prime · ships Sat' },
];

const Demo6 = () => {
  const [step, setStep] = useState(0);
  const typed = useTyped(PROMPT, step === 0, 20);

  // steps: 0 type · 1 sent · 2 thinking · 3 querying · 4 how-evaluated · 5 cart+line · 6 ptb · 7 permission · 8 executing · 9 done
  useEffect(() => {
    const delays = { 0: PROMPT.length * 20 + 500, 1: 700, 2: 1800, 3: 4200, 4: 800, 5: 1000, 6: 900 };
    const d = delays[step]; if (d == null) return;
    const t = setTimeout(() => setStep(s => s + 1), d);
    return () => clearTimeout(t);
  }, [step]);

  const approve = () => { setStep(8); setTimeout(() => setStep(9), 1400); };
  const restart = () => setStep(0);

  // Auto-confirm order after 3s (mirrors demo 03/04 review pattern)
  useEffect(() => {
    if (step === 7) { const t = setTimeout(approve, 3000); return () => clearTimeout(t); }
  }, [step]);

  const tools = [
    { glyph: '🎈', label: 'PARTY CITY MPP',  finishAt: 900,  result: 'balloons × 20 + streamers · $20 · ships Sat' },
    { glyph: '💡', label: 'AMAZON MPP',       finishAt: 1500, result: 'fairy lights 10m · $24 · Prime Sat' },
    { glyph: '🎂', label: 'CAKEBOSS MPP',     finishAt: 2400, result: 'custom cake 10-inch · $55 · pickup Sat 10am' },
    { glyph: '🎉', label: 'AMAZON MPP',       finishAt: 3000, result: '"Happy Birthday" banner · $9 · Prime Sat' },
    { glyph: '📦', label: 'DELIVERY CONFIRM', finishAt: 3900, result: 'all 3 vendors confirm Saturday ✓' },
  ];

  return (
    <MainShell
      hero={step === 0}
      balance={step >= 9 ? '$1,892' : '$2,000'}
      balanceLabel={step >= 9 ? 'AVAILABLE $1,892 · EARNING $11' : 'AVAILABLE $2,000 · EARNING $11'}
      name="felix"
      composer={<Composer value={step === 0 ? typed : ''}/>}
      ribbon={<DemoRibbon/>}
    >
      <TaskInitiated/>
      {step >= 1 && <UserBubble>{PROMPT}</UserBubble>}

      {step >= 2 && (
        <>
          <ThinkingHeader done={step >= 3}/>
          <ReasoningStream text={THOUGHT} active={step >= 2} done={step >= 3}/>
          {step >= 3 && <ParallelTools tools={tools} active={step >= 3} headerLabel="QUERYING 3 VENDORS IN PARALLEL · MPP DISCOVERY"/>}
          {step >= 4 && (
            <HowIEvaluated tokens="224" model="AUDRIC v2.0" latency="3.9s">
              All 5 items available, all deliver Saturday. Total $108 — $12 under your $120 budget. Party City ships same-day; Amazon Prime confirms Saturday; CakeBoss has a Saturday 10am pickup slot open.
            </HowIEvaluated>
          )}
        </>
      )}

      {step >= 5 && (
        <ToolCard label="PARTY CART · READY" status="done" tokens="0.4s">
          <div>
            {CART.map((item, i) => (
              <div key={i} style={{
                display:'flex', alignItems:'center', gap:12,
                padding:'12px 18px',
                borderBottom: i < CART.length - 1 ? '1px solid var(--line)' : 'none'
              }}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:14, color:'var(--text)'}}>{item.name}</div>
                  <div className="mono" style={{fontSize:9, color:'var(--text-3)', marginTop:3, letterSpacing:'.1em'}}>{item.vendor} · {item.detail}</div>
                </div>
                <span className="mono" style={{fontSize:13, color:'var(--text)', flexShrink:0}}>{item.price}</span>
              </div>
            ))}
            <div style={{
              display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'12px 18px', background:'var(--panel-2)',
              borderTop:'2px solid var(--line-2)'
            }}>
              <span className="mono" style={{fontSize:9, color:'var(--text-3)', letterSpacing:'.1em'}}>4 ITEMS · 3 VENDORS · SAT DELIVERY</span>
              <div style={{display:'flex', alignItems:'baseline', gap:8}}>
                <span className="mono" style={{fontSize:9, color:'var(--green)', letterSpacing:'.1em'}}>$12 UNDER BUDGET</span>
                <span className="mono" style={{fontSize:16, color:'var(--text)'}}>$108</span>
              </div>
            </div>
          </div>
        </ToolCard>
      )}

      {step >= 5 && (
        <AudricLine>
          Found everything under budget — <strong style={{color:'var(--text)'}}>$108 of $120</strong>. All 3 vendors deliver Saturday. One signature covers all.
        </AudricLine>
      )}

      {step >= 6 && (
        <PtbCard
          calls={[
            {vendor:'Party City (MPP)', desc:'Balloons × 20 + streamers · ships Saturday',      amount:'$20'},
            {vendor:'Amazon (MPP)',     desc:'Fairy lights 10m + banner · Prime Saturday',        amount:'$33'},
            {vendor:'CakeBoss (MPP)',   desc:'Custom birthday cake 10-inch · pickup Sat 10am',    amount:'$55'},
          ]}
          total="$108"
        />
      )}

      {step === 7 && (
        <OrderReviewCard total="$108" onAccept={approve} onCancel={restart}
          footer="Single PTB on Sui — Party City, Amazon, CakeBoss paid atomically. If any order fails, all three revert."
        />
      )}

      {step === 8 && (
        <div className="appear" style={{display:'flex',alignItems:'center',gap:10,fontSize:12,color:'var(--blue)',padding:'8px 4px'}}>
          <span className="spin" style={{display:'inline-block'}}><Icon name="spinner" size={14}/></span>
          <span className="mono pulse" style={{letterSpacing:'.1em'}}>EXECUTING PAYMENT STREAM · 1 PTB · 3 CALLS…</span>
        </div>
      )}

      {step >= 9 && (
        <>
          <AudricLine>
            Done. <strong style={{color:'var(--text)'}}>5 items, 3 shops, $108 USDC.</strong> Balloons and lights arrive Saturday morning. Cake pickup: 10am. Party's sorted.
          </AudricLine>
          <div className="compare-3" style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10}}>
            <ShopReceipt vendor="Party City" item="Balloons + streamers" cost="$20" eta="SHIPS SAT · USPS"  delay={0}/>
            <ShopReceipt vendor="Amazon"     item="Lights + banner"      cost="$33" eta="SHIPS SAT · PRIME" delay={90}/>
            <ShopReceipt vendor="CakeBoss"   item="Custom birthday cake" cost="$55" eta="PICKUP SAT · 10AM" delay={180}/>
          </div>
          <WhyOnlySui points={[
            "3 vendors, 1 PTB. If CakeBoss can't deliver Saturday, Party City and Amazon revert too. No partial charges, ever.",
            "USDC settles in 0.6s across all vendors. No card authorisation holds, no 2–3 day payment delays to merchants.",
            "One on-chain receipt covers the whole order. Permanent, auditable, owned by you — not a merchant's database entry.",
          ]}/>
        </>
      )}
    </MainShell>
  );
};

const OrderReviewCard = ({ total, onAccept, onCancel, footer }) => (
  <div className="appear" style={{
    border:'1.5px solid var(--text)', borderRadius:10,
    background:'var(--panel)', overflow:'hidden',
    boxShadow:'0 2px 0 var(--text)'
  }}>
    <div style={{padding:'10px 16px', borderBottom:'1px solid var(--line)', background:'var(--panel-2)', display:'flex', alignItems:'center', gap:10}}>
      <Icon name="shield" size={12} color="var(--blue)"/>
      <span className="mono" style={{fontSize:10, color:'var(--text-2)', letterSpacing:'.14em'}}>YOUR APPROVAL · REVIEW BEFORE PAYING</span>
    </div>
    <div style={{padding:'14px 16px', display:'flex', gap:10, flexWrap:'wrap'}}>
      <button onClick={onAccept} className="mono" style={{
        flex:'1 1 200px', padding:'14px 16px', borderRadius:8, background:'var(--text)', color:'#fff',
        fontSize:11, letterSpacing:'.14em', display:'flex', alignItems:'center', justifyContent:'center', gap:8
      }}>
        <Icon name="check" size={14}/> CONFIRM · PAY {total} USDC
      </button>
      <button onClick={onCancel} className="mono" style={{
        flex:'1 1 80px', padding:'14px 16px', borderRadius:8, background:'transparent', color:'var(--text-3)',
        border:'1px solid var(--line)', fontSize:11, letterSpacing:'.14em', display:'flex', alignItems:'center', justifyContent:'center', gap:8
      }}>
        <Icon name="close" size={14}/> CANCEL
      </button>
    </div>
    <div style={{padding:'10px 16px', borderTop:'1px solid var(--line)', background:'var(--panel-2)', fontSize:11, color:'var(--text-3)', display:'flex', alignItems:'center', gap:8}}>
      <Icon name="bolt" size={11} color="var(--text-3)"/>
      <span>{footer}</span>
    </div>
  </div>
);

const ShopReceipt = ({ vendor, item, cost, eta, delay = 0 }) => (
  <div className="appear" style={{animationDelay:`${delay}ms`, border:'1px solid var(--line)', borderRadius:8, padding:'14px 16px', background:'var(--panel)'}}>
    <div style={{display:'flex', alignItems:'center', gap:8}}>
      <Tag tone="dark">{vendor.toUpperCase()}</Tag>
      <span style={{fontFamily:'var(--font-serif)', fontSize:18, marginLeft:'auto', letterSpacing:'-.01em'}}>{cost}</span>
    </div>
    <div style={{fontSize:13, color:'var(--text)', marginTop:10}}>{item}</div>
    <div className="mono" style={{fontSize:9, color:'var(--green)', marginTop:6, letterSpacing:'.12em'}}>✓ {eta}</div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Demo6/>);
</script>
</body>
</html>
