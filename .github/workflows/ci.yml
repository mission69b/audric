name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): cancel previous CI
# runs when a new commit lands on the SAME PR. Main pushes get unique
# groups (per-ref) and never cancel each other. Saves CI minutes during
# PR iteration without risking half-merged main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 2026-05-25: filters fixed from `--filter web` (the deleted v0.7e apps/web
# package) to `--filter @audric/web-v2`. Pre-fix, every job exited 0 with
# "No projects matched the filters" — CI was silently green-but-empty for
# ~3 days after v0.7e Phase 5 (S.253, 2026-05-22) archived apps/web. The
# dead spec-consistency runner step was also dropped; the runtime check
# lived at `apps/web/lib/engine/spec-consistency.ts` and went with the
# archive. Vercel handles the production build (with real secrets); CI
# focuses on lint + typecheck + test, matching the vercel/chatbot template
# pattern (lint.yml + playwright.yml).
jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @audric/web-v2 lint
      - run: pnpm --filter @audric/web-v2 check:ads
      - run: pnpm --filter @audric/web-v2 typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @audric/web-v2 test
