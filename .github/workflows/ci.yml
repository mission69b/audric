name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): cancel previous CI
# runs when a new commit lands on the SAME PR. Main pushes get unique
# groups (per-ref) and never cancel each other. Saves CI minutes during
# PR iteration without risking half-merged main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 2026-06-25: retargeted from the FROZEN `@audric/web-v2` to the live
# `@audric/web-v3`. web-v2 was archived; CI had no gate on the production app
# (web-v3) — local tsc/Biome was the only safety net. Now: lint (Biome via
# ultracite) + typecheck (tsc) + the deterministic eval (eval:image — a pure
# regression lock, no server/secrets). Playwright e2e (`web-v3 test`) is NOT
# run here — it needs a running server + browsers + secrets; keep it as a
# separate follow-up workflow. Vercel handles the production build with real
# secrets; CI focuses on the no-secret static gates.
jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @audric/web-v3 lint
      - run: pnpm --filter @audric/web-v3 typecheck

  eval:
    name: Evals (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @audric/web-v3 eval:image
